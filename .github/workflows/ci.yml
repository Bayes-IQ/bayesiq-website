name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Bayes-IQ/bayesiq-design-system
          path: bayesiq-design-system

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build design system
        run: npm install && npm run build
        working-directory: bayesiq-design-system

      - name: Link design system as sibling
        run: ln -s "$GITHUB_WORKSPACE/bayesiq-design-system" ../bayesiq-design-system

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm test
